<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InterviewAssist | Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(270deg,#ede9fe,#ddd6fe,#f5d0fe);}
.container{width:900px;height:520px;background:#fff;border-radius:20px;display:flex;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.form{width:50%;padding:40px;display:flex;flex-direction:column;justify-content:center;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
.logo-box{width:35px;height:35px;background:#7c3aed;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.field{margin-bottom:20px;}
.field input{width:100%;padding:10px;border:none;border-bottom:2px solid #ddd;}
.field input:focus{border-color:#7c3aed;}
.btn{padding:12px;background:#7c3aed;color:#fff;border:none;border-radius:10px;cursor:pointer;}
.toggle{margin-top:15px;font-size:14px;}
.toggle span{color:#7c3aed;cursor:pointer;}
.visual{width:50%;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="form" id="loginCard">
    <div class="logo"><div class="logo-box">IA</div><span>InterviewAssist</span></div>

    <h2>Login</h2>

    <div class="field">
      <input type="email" id="loginEmail" placeholder="Email">
    </div>

    <div class="field">
      <input type="password" id="loginPassword" placeholder="Password">
    </div>

    <button class="btn" onclick="login()">Login</button>

    <div class="toggle">
      Don’t have an account?
      <span onclick="showRegister()">Sign up</span>
    </div>
  </div>


  <!-- REGISTER -->
  <div class="form" id="registerCard" style="display:none;">
    <div class="logo"><div class="logo-box">IA</div><span>InterviewAssist</span></div>

    <h2>Register</h2>

    <div class="field">
      <input type="text" id="registerName" placeholder="Full Name">
    </div>

    <div class="field">
      <input type="email" id="registerEmail" placeholder="Email">
    </div>

    <div class="field">
      <input type="password" id="registerPassword" placeholder="Password">
    </div>

    <button class="btn" onclick="registerUser()">Register</button>

    <div class="toggle">
      Already have an account?
      <span onclick="showLogin()">Login</span>
    </div>
  </div>


  <!-- RIGHT SIDE -->
  <div class="visual">
    <div>
      <h1>InterviewAssist</h1>
      <p>AI-powered interview practice platform</p>
    </div>
  </div>

</div>


<script>

const API = "http://localhost:5000/api/auth";

// 🔁 TOGGLE
function showRegister(){
  document.getElementById("loginCard").style.display="none";
  document.getElementById("registerCard").style.display="flex";
}

function showLogin(){
  document.getElementById("registerCard").style.display="none";
  document.getElementById("loginCard").style.display="flex";
}


// 🔐 LOGIN
async function login(){

  console.log("Login clicked 🔥");

  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value.trim();

  if(!email || !password){
    alert("Enter email & password ❌");
    return;
  }

  try{
    const res = await fetch(`${API}/login`,{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log("Login response:", data);

    if(data.success){
      localStorage.setItem("userId", data.userId);
      localStorage.setItem("userName", data.name);
      localStorage.setItem("userEmail", data.email);
      localStorage.setItem("token", data.token);

      alert("Login successful ✅");
      window.location.href="dashboard.html";
    }else{
      alert(data.message || "Invalid login ❌");
    }

  }catch(err){
    console.error(err);
    alert("Server error ❌");
  }
}


// 📝 REGISTER
async function registerUser(){

  console.log("Register clicked 🔥");

  const name = document.getElementById("registerName").value.trim();
  const email = document.getElementById("registerEmail").value.trim();
  const password = document.getElementById("registerPassword").value.trim();

  if(!name || !email || !password){
    alert("Fill all fields ❌");
    return;
  }

  try{
    const res = await fetch(`${API}/register`,{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();
    console.log("Register response:", data);

    if(data.success){
      alert("Registered Successfully ✅");
      showLogin();
    }else{
      alert(data.message || "Registration failed ❌");
    }

  }catch(err){
    console.error(err);
    alert("Server error ❌");
  }
}

</script>

</body>
</html>
